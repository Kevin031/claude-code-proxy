<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 背景：深邃的网络空间 -->
    <radialGradient id="space" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>

    <!-- Claude 橙 -->
    <linearGradient id="claudeOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E88B6F"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>

    <!-- 数据流光 -->
    <linearGradient id="dataStream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D97757" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- 主内容组：缩放到 832x832 安全区域（macOS 图标标准） -->
  <g transform="translate(96, 96)">
    <!-- 背景：圆角矩形 -->
    <rect width="832" height="832" rx="200" fill="url(#space)"/>

    <!-- 外圈装饰：网络节点环 -->
    <circle cx="416" cy="416" r="380" fill="none" stroke="#D97757" stroke-width="1" opacity="0.15"/>
    <circle cx="416" cy="416" r="340" fill="none" stroke="#D97757" stroke-width="1" opacity="0.1" stroke-dasharray="20 20"/>

    <!-- 角落网络节点 -->
    <g opacity="0.4">
      <circle cx="160" cy="160" r="10" fill="#D97757" filter="url(#softGlow)"/>
      <circle cx="672" cy="160" r="8" fill="#D97757" filter="url(#softGlow)"/>
      <circle cx="160" cy="672" r="8" fill="#D97757" filter="url(#softGlow)"/>
      <circle cx="672" cy="672" r="10" fill="#D97757" filter="url(#softGlow)"/>
      <!-- 连接线 -->
      <line x1="160" y1="160" x2="672" y2="160" stroke="#D97757" stroke-width="1" opacity="0.2"/>
      <line x1="672" y1="160" x2="672" y2="672" stroke="#D97757" stroke-width="1" opacity="0.2"/>
      <line x1="672" y1="672" x2="160" y2="672" stroke="#D97757" stroke-width="1" opacity="0.2"/>
      <line x1="160" y1="672" x2="160" y2="160" stroke="#D97757" stroke-width="1" opacity="0.2"/>
    </g>

    <!-- 主视觉：Claude Code 像素笑脸 -->
    <g transform="translate(416, 392)">
      <!-- 主体：圆角矩形脸 -->
      <rect x="-260" y="-196" width="520" height="392" rx="64" fill="url(#claudeOrange)" filter="url(#glow)"/>

      <!-- 左侧手臂/触角 -->
      <rect x="-340" y="-64" width="96" height="64" rx="16" fill="url(#claudeOrange)"/>
      <rect x="-352" y="-48" width="32" height="32" rx="10" fill="url(#claudeOrange)"/>

      <!-- 右侧手臂/触角 -->
      <rect x="244" y="-64" width="96" height="64" rx="16" fill="url(#claudeOrange)"/>
      <rect x="320" y="-48" width="32" height="32" rx="10" fill="url(#claudeOrange)"/>

      <!-- 底部左腿 -->
      <rect x="-160" y="160" width="64" height="96" rx="16" fill="url(#claudeOrange)"/>
      <rect x="-160" y="240" width="64" height="48" rx="12" fill="url(#claudeOrange)"/>

      <!-- 底部右腿 -->
      <rect x="96" y="160" width="64" height="96" rx="16" fill="url(#claudeOrange)"/>
      <rect x="96" y="240" width="64" height="48" rx="12" fill="url(#claudeOrange)"/>

      <!-- 眼睛：左（数据包接收中） -->
      <g transform="translate(-96, -32)">
        <rect x="0" y="0" width="64" height="96" rx="6" fill="#1a1a2e"/>
        <!-- 瞳孔：变成数据包图标 -->
        <rect x="16" y="32" width="32" height="32" rx="3" fill="#D97757"/>
        <text x="32" y="54" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>
      </g>

      <!-- 眼睛：右（扫描状态） -->
      <g transform="translate(32, -32)">
        <rect x="0" y="0" width="64" height="96" rx="6" fill="#1a1a2e"/>
        <!-- 扫描线动画效果（静态表现） -->
        <rect x="8" y="24" width="48" height="3" fill="#D97757" opacity="0.8"/>
        <rect x="8" y="40" width="32" height="3" fill="#D97757" opacity="0.6"/>
        <rect x="8" y="56" width="40" height="3" fill="#D97757" opacity="0.4"/>
      </g>

      <!-- 嘴巴：网络流形状 -->
      <rect x="-96" y="80" width="192" height="20" rx="6" fill="#1a1a2e"/>
      <!-- 嘴巴里的数据流动点 -->
      <circle cx="-64" cy="90" r="5" fill="#D97757"/>
      <circle cx="-16" cy="90" r="5" fill="#D97757"/>
      <circle cx="32" cy="90" r="5" fill="#D97757"/>
      <circle cx="80" cy="90" r="5" fill="#D97757"/>
    </g>

    <!-- 底部数据流装饰 -->
    <g transform="translate(0, 736)">
      <rect x="80" y="0" width="672" height="2" fill="url(#dataStream)" opacity="0.5"/>
      <!-- 漂浮的数据包 -->
      <rect x="120" y="-14" width="48" height="26" rx="3" fill="#D97757" opacity="0.7"/>
      <text x="144" y="6" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>

      <rect x="320" y="-16" width="64" height="32" rx="3" fill="#D97757" opacity="0.8" filter="url(#softGlow)"/>
      <text x="352" y="6" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">POST</text>

      <rect x="560" y="-14" width="64" height="26" rx="3" fill="#D97757" opacity="0.7"/>
      <text x="592" y="6" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">WS</text>
    </g>

    <!-- 顶部状态指示 -->
    <g transform="translate(416, 96)">
      <circle cx="0" cy="0" r="6" fill="#27c93f" filter="url(#softGlow)"/>
      <text x="16" y="4" font-family="monospace" font-size="16" fill="#666" font-weight="bold">CAPTURING</text>
    </g>
  </g>
</svg>
